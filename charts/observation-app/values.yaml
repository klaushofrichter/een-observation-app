image:
  repository: een-labs-observation-app
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 8080
  targetPort: 8080

# Labs-only auth keeps no secrets in the container. Leave empty.
secretEnvFrom: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi
