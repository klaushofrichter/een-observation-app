name: E2E Tests

on:
  pull_request:
    branches:
      - production

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        # Labs dev-bypass: specs skip cleanly unless VITE_DEV_EEN_TOKEN is set.
        # Set the two secrets below to a current EEN access token + cluster base
        # URL to exercise the suite in CI.
        run: npm test
        env:
          VITE_AUTH_MODE: dev
          VITE_DEV_EEN_TOKEN: ${{ secrets.VITE_DEV_EEN_TOKEN }}
          VITE_DEV_EEN_BASE_URL: ${{ secrets.VITE_DEV_EEN_BASE_URL }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
