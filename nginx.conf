server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback: any unknown path serves index.html so Vue Router can
    # handle client-side routing. (Labs strips the /experiments/<slug> prefix
    # before proxying, so nginx serves the SPA at root.)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed assets emitted by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the entry HTML.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Basic security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
